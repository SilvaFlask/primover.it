<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primover - Materie Prime per la Comunicazione</title>
    <meta name="description" content="Primover - Materie prime per la comunicazione. Sito in costruzione. Website under construction.">
    <style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500&display=swap');

*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --black: #1a1a1a;
    --white: #ffffff;
    --off-white: #fafafa;
    --gray-light: #e8e8e8;
    --gray-medium: #999999;
    --gray-dark: #555555;
    --red: #d4232a;
    --green: #6b8e23;
    --gold: #c8a951;
}

html {
    font-size: 16px;
    scroll-behavior: smooth;
}

body {
    font-family: 'Montserrat', sans-serif;
    background-color: var(--white);
    color: var(--black);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(circle at 15% 25%, rgba(107, 142, 35, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 85% 75%, rgba(212, 35, 42, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(200, 169, 81, 0.02) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
}

.container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    max-width: 900px;
    width: 100%;
    animation: fadeInUp 1.2s ease-out;
}

.logo-wrapper {
    margin-bottom: 3.5rem;
    animation: fadeIn 1.5s ease-out;
}

.logo-wrapper img {
    max-width: 480px;
    width: 90%;
    height: auto;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.04));
}

.divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gray-medium), transparent);
    margin: 0 auto 3rem auto;
    animation: expandLine 1.8s ease-out;
}

.message-block {
    margin-bottom: 2.5rem;
}

.message-it {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 400;
    color: var(--black);
    letter-spacing: 0.02em;
    line-height: 1.4;
    margin-bottom: 0.6rem;
    animation: fadeInUp 1.4s ease-out;
}

.message-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem;
    font-weight: 300;
    font-style: italic;
    color: var(--gray-dark);
    letter-spacing: 0.03em;
    line-height: 1.4;
    animation: fadeInUp 1.6s ease-out;
}

.subtitle {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.82rem;
    font-weight: 300;
    color: var(--gray-medium);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 2.5rem;
    animation: fadeInUp 1.8s ease-out;
}

.dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 3rem;
    animation: fadeIn 2.2s ease-out;
}

.dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: pulse 2.5s ease-in-out infinite;
}

.dot:nth-child(1) { background-color: var(--red); animation-delay: 0s; }
.dot:nth-child(2) { background-color: var(--green); animation-delay: 0.3s; }
.dot:nth-child(3) { background-color: var(--gold); animation-delay: 0.6s; }
.dot:nth-child(4) { background-color: #2563eb; animation-delay: 0.9s; }
.dot:nth-child(5) { background-color: var(--black); animation-delay: 1.2s; }

.footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    text-align: center;
    padding: 1.5rem;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem;
    font-weight: 300;
    color: var(--gray-medium);
    letter-spacing: 0.1em;
    animation: fadeIn 2.5s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes expandLine {
    from {
        width: 0;
        opacity: 0;
    }
    to {
        width: 60px;
        opacity: 1;
    }
}

@keyframes pulse {
    0%, 100% {
        opacity: 0.4;
        transform: scale(1);
    }
    50% {
        opacity: 1;
        transform: scale(1.3);
    }
}

@media (max-width: 768px) {
    .message-it {
        font-size: 1.6rem;
    }
    .message-en {
        font-size: 1.1rem;
    }
    .logo-wrapper img {
        max-width: 340px;
    }
    .logo-wrapper {
        margin-bottom: 2.5rem;
    }
}

@media (max-width: 480px) {
    .message-it {
        font-size: 1.3rem;
    }
    .message-en {
        font-size: 0.95rem;
    }
    .logo-wrapper img {
        max-width: 280px;
    }
    .subtitle {
        font-size: 0.7rem;
    }
}

    </style>
</head>
<body>
<div class="container">
    <div class="logo-wrapper">
        <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310419663031377675/OFHFamiSPGiqAtTH.png" alt="Primover - Materie prime per la comunicazione">
    </div>

    <div class="divider"></div>

    <div class="message-block">
        <p class="message-it">Stiamo creando qualcosa di straordinario per voi.</p>
        <p class="message-en">We are crafting something extraordinary for you.</p>
    </div>

    <p class="subtitle">Prossimamente &middot; Coming Soon</p>

    <div class="dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>
</div>

<div class="footer">
    &copy; 2026 Primover &mdash; Materie prime per la comunicazione
</div>

</body>
</html>
